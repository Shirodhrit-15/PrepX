name: prepx
description: PrepX - AI Mock Interview Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase (updated to v3)
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  cloud_functions: ^5.4.0

  # State management
  provider: ^6.1.2

  # File / media
  file_picker: ^8.1.2
  image_picker: ^1.1.2

  # API & networking
  permission_handler: ^11.3.1
  http: ^1.2.2
  web_socket_channel: ^3.0.1

  # Google Sign-In
  google_sign_in: ^6.2.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/